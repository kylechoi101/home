<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bStone" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#6a6e78"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
    <radialGradient id="wStone" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c5cad3"/>
    </radialGradient>
    <filter id="stoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c882"/>
      <stop offset="100%" stop-color="#d4a84a"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1310"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Board surface -->
  <rect x="75" y="25" width="650" height="450" rx="6" fill="url(#boardGrad)" stroke="#b8922e" stroke-width="1.5"/>

  <!-- Grid lines - 19x19 mapped to board area -->
  <!-- Vertical lines (19) -->
  <g stroke="#8b6914" stroke-width="0.7" opacity="0.7">
    <line x1="110" y1="55" x2="110" y2="445"/>
    <line x1="145" y1="55" x2="145" y2="445"/>
    <line x1="180" y1="55" x2="180" y2="445"/>
    <line x1="215" y1="55" x2="215" y2="445"/>
    <line x1="250" y1="55" x2="250" y2="445"/>
    <line x1="285" y1="55" x2="285" y2="445"/>
    <line x1="320" y1="55" x2="320" y2="445"/>
    <line x1="355" y1="55" x2="355" y2="445"/>
    <line x1="390" y1="55" x2="390" y2="445"/>
    <line x1="425" y1="55" x2="425" y2="445"/>
    <line x1="460" y1="55" x2="460" y2="445"/>
    <line x1="495" y1="55" x2="495" y2="445"/>
    <line x1="530" y1="55" x2="530" y2="445"/>
    <line x1="565" y1="55" x2="565" y2="445"/>
    <line x1="600" y1="55" x2="600" y2="445"/>
    <line x1="635" y1="55" x2="635" y2="445"/>
    <line x1="670" y1="55" x2="670" y2="445"/>
    <line x1="705" y1="55" x2="705" y2="445"/>
    <line x1="110" y1="55" x2="110" y2="445"/>
  </g>
  <!-- Horizontal lines (19) -->
  <g stroke="#8b6914" stroke-width="0.7" opacity="0.7">
    <line x1="110" y1="55" x2="705" y2="55"/>
    <line x1="110" y1="77.2" x2="705" y2="77.2"/>
    <line x1="110" y1="99.4" x2="705" y2="99.4"/>
    <line x1="110" y1="121.7" x2="705" y2="121.7"/>
    <line x1="110" y1="143.9" x2="705" y2="143.9"/>
    <line x1="110" y1="166.1" x2="705" y2="166.1"/>
    <line x1="110" y1="188.3" x2="705" y2="188.3"/>
    <line x1="110" y1="210.6" x2="705" y2="210.6"/>
    <line x1="110" y1="232.8" x2="705" y2="232.8"/>
    <line x1="110" y1="255" x2="705" y2="255"/>
    <line x1="110" y1="277.2" x2="705" y2="277.2"/>
    <line x1="110" y1="299.4" x2="705" y2="299.4"/>
    <line x1="110" y1="321.7" x2="705" y2="321.7"/>
    <line x1="110" y1="343.9" x2="705" y2="343.9"/>
    <line x1="110" y1="366.1" x2="705" y2="366.1"/>
    <line x1="110" y1="388.3" x2="705" y2="388.3"/>
    <line x1="110" y1="410.6" x2="705" y2="410.6"/>
    <line x1="110" y1="432.8" x2="705" y2="432.8"/>
    <line x1="110" y1="445" x2="705" y2="445"/>
  </g>

  <!-- Star points (hoshi) -->
  <g fill="#8b6914">
    <circle cx="215" cy="121.7" r="3.5"/>
    <circle cx="390" cy="121.7" r="3.5"/>
    <circle cx="600" cy="121.7" r="3.5"/>
    <circle cx="215" cy="255" r="3.5"/>
    <circle cx="390" cy="255" r="3.5"/>
    <circle cx="600" cy="255" r="3.5"/>
    <circle cx="215" cy="388.3" r="3.5"/>
    <circle cx="390" cy="388.3" r="3.5"/>
    <circle cx="600" cy="388.3" r="3.5"/>
  </g>

  <!-- Stones - natural mid-game position -->
  <g filter="url(#stoneShadow)">
    <!-- Upper right corner joseki -->
    <circle cx="600" cy="99.4" r="14" fill="url(#bStone)"/>
    <circle cx="635" cy="121.7" r="14" fill="url(#wStone)"/>
    <circle cx="600" cy="143.9" r="14" fill="url(#bStone)"/>
    <circle cx="565" cy="121.7" r="14" fill="url(#wStone)"/>
    <circle cx="565" cy="99.4" r="14" fill="url(#bStone)"/>
    <circle cx="635" cy="99.4" r="14" fill="url(#wStone)"/>
    <circle cx="670" cy="121.7" r="14" fill="url(#bStone)"/>
    <circle cx="635" cy="143.9" r="14" fill="url(#wStone)"/>

    <!-- Upper left corner -->
    <circle cx="215" cy="99.4" r="14" fill="url(#bStone)"/>
    <circle cx="250" cy="121.7" r="14" fill="url(#wStone)"/>
    <circle cx="180" cy="121.7" r="14" fill="url(#bStone)"/>
    <circle cx="215" cy="143.9" r="14" fill="url(#wStone)"/>
    <circle cx="180" cy="143.9" r="14" fill="url(#bStone)"/>
    <circle cx="145" cy="121.7" r="14" fill="url(#wStone)"/>

    <!-- Lower left corner -->
    <circle cx="215" cy="388.3" r="14" fill="url(#wStone)"/>
    <circle cx="180" cy="366.1" r="14" fill="url(#bStone)"/>
    <circle cx="250" cy="366.1" r="14" fill="url(#wStone)"/>
    <circle cx="215" cy="343.9" r="14" fill="url(#bStone)"/>
    <circle cx="180" cy="388.3" r="14" fill="url(#bStone)"/>
    <circle cx="145" cy="366.1" r="14" fill="url(#wStone)"/>

    <!-- Lower right corner -->
    <circle cx="600" cy="388.3" r="14" fill="url(#wStone)"/>
    <circle cx="635" cy="366.1" r="14" fill="url(#bStone)"/>
    <circle cx="565" cy="366.1" r="14" fill="url(#wStone)"/>
    <circle cx="600" cy="343.9" r="14" fill="url(#bStone)"/>
    <circle cx="635" cy="388.3" r="14" fill="url(#bStone)"/>
    <circle cx="670" cy="366.1" r="14" fill="url(#wStone)"/>

    <!-- Center fight -->
    <circle cx="390" cy="232.8" r="14" fill="url(#bStone)"/>
    <circle cx="425" cy="255" r="14" fill="url(#wStone)"/>
    <circle cx="355" cy="255" r="14" fill="url(#bStone)"/>
    <circle cx="390" cy="277.2" r="14" fill="url(#wStone)"/>
    <circle cx="425" cy="232.8" r="14" fill="url(#bStone)"/>
    <circle cx="355" cy="210.6" r="14" fill="url(#wStone)"/>
    <circle cx="390" cy="210.6" r="14" fill="url(#bStone)"/>
    <circle cx="320" cy="232.8" r="14" fill="url(#wStone)"/>
    <circle cx="460" cy="255" r="14" fill="url(#bStone)"/>
    <circle cx="425" cy="277.2" r="14" fill="url(#wStone)"/>

    <!-- Side extensions -->
    <circle cx="390" cy="121.7" r="14" fill="url(#bStone)"/>
    <circle cx="390" cy="143.9" r="14" fill="url(#wStone)"/>
    <circle cx="425" cy="143.9" r="14" fill="url(#bStone)"/>
    <circle cx="320" cy="388.3" r="14" fill="url(#wStone)"/>
    <circle cx="355" cy="388.3" r="14" fill="url(#bStone)"/>
    <circle cx="460" cy="388.3" r="14" fill="url(#wStone)"/>
    <circle cx="495" cy="366.1" r="14" fill="url(#bStone)"/>
    <circle cx="460" cy="343.9" r="14" fill="url(#wStone)"/>

    <!-- Scattered influence stones -->
    <circle cx="285" cy="188.3" r="14" fill="url(#bStone)"/>
    <circle cx="495" cy="188.3" r="14" fill="url(#wStone)"/>
    <circle cx="285" cy="321.7" r="14" fill="url(#wStone)"/>
    <circle cx="495" cy="321.7" r="14" fill="url(#bStone)"/>
  </g>
</svg>
