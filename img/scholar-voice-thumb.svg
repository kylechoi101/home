<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgG)" rx="0"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Impact of Voice and Identity on LLM Methodological Critique</text>

  <!-- Y-axis -->
  <text x="68" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" transform="rotate(-90, 68, 260)">Percentage (%)</text>

  <!-- Y-axis labels & grid lines -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">
    <text x="98" y="430">0</text>
    <line x1="105" y1="426" x2="740" y2="426" stroke="#334155" stroke-width="0.5"/>
    <text x="98" y="350">20</text>
    <line x1="105" y1="346" x2="740" y2="346" stroke="#334155" stroke-width="0.5"/>
    <text x="98" y="270">40</text>
    <line x1="105" y1="266" x2="740" y2="266" stroke="#334155" stroke-width="0.5"/>
    <text x="98" y="190">60</text>
    <line x1="105" y1="186" x2="740" y2="186" stroke="#334155" stroke-width="0.5"/>
    <text x="98" y="110">80</text>
    <line x1="105" y1="106" x2="740" y2="106" stroke="#334155" stroke-width="0.5"/>
    <text x="98" y="70">100</text>
    <line x1="105" y1="66" x2="740" y2="66" stroke="#334155" stroke-width="0.5"/>
  </g>

  <!-- Baseline -->
  <line x1="105" y1="426" x2="740" y2="426" stroke="#475569" stroke-width="1.5"/>

  <!-- Group 1: Plain Assistant (1st Person) - 35% blue, 45% red -->
  <rect x="135" y="286" width="55" height="140" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <text x="162" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1">35%</text>
  <rect x="195" y="246" width="55" height="180" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="222" y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">45%</text>
  <text x="192" y="456" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">Plain Assistant</text>
  <text x="192" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">(1st Person)</text>

  <!-- Group 2: Named Scholar (1st Person) - 55% blue, 20% red -->
  <rect x="295" y="206" width="55" height="220" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <text x="322" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1">55%</text>
  <rect x="355" y="346" width="55" height="80" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="382" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">20%</text>
  <text x="352" y="456" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">Named Scholar</text>
  <text x="352" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">(1st Person)</text>

  <!-- Group 3: Generic Expert (3rd Person) - 60% blue, 15% red -->
  <rect x="455" y="186" width="55" height="240" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <text x="482" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1">60%</text>
  <rect x="515" y="366" width="55" height="60" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="542" y="358" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">15%</text>
  <text x="512" y="456" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">Generic Expert</text>
  <text x="512" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">(3rd Person)</text>

  <!-- Group 4: Named Scholar (3rd Person) - 95% blue, 0% red -->
  <rect x="615" y="86" width="55" height="340" rx="3" fill="url(#barBlue)" opacity="0.9"/>
  <text x="642" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1">95%</text>
  <rect x="675" y="426" width="55" height="0" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="702" y="418" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">0%</text>
  <text x="672" y="456" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">Named Scholar</text>
  <text x="672" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94a3b8">(3rd Person)</text>

  <!-- Legend -->
  <rect x="530" y="52" width="14" height="14" rx="2" fill="url(#barBlue)" opacity="0.9"/>
  <text x="550" y="64" font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#cbd5e1">Complex Flaw Detection Rate (%)</text>
  <rect x="530" y="72" width="14" height="14" rx="2" fill="url(#barRed)" opacity="0.85"/>
  <text x="550" y="84" font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#fca5a5">Capitulation Rate to Authority (%)</text>

  <!-- X-axis label -->
  <text x="420" y="496" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8">LLM Persona Configuration</text>
</svg>
